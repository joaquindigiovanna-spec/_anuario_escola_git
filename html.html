<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro con páginas</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scene">

        <div class="book" id="book">

            <!-- TAPA -->

            <div class="cover" id="cover">
                <h1>Libro</h1>
            </div>

            <!-- PAGINA 1 -->

            <div class="page page1" id="page1">

                <div class="front">
                    <h2>Página 1</h2>
                    <p>Primera página del libro.</p>
                </div>

                <div class="back">
                    <h2>Página 2</h2>
                    <p>Parte trasera de la página.</p>
                </div>

            </div>

            <!-- PAGINA 2 -->

            <div class="page page2" id="page2">

                <div class="front">
                    <h2>Página 3</h2>
                    <p>Otra página más.</p>
                </div>

                <div class="back">
                    <h2>Página 4</h2>
                    <p>Última página.</p>
                </div>

            </div>

        </div>

    </div>

    <div class="buttons">

        <button id="prevPage">
            ← Anterior
        </button>

        <button id="nextPage">
            Siguiente →
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
